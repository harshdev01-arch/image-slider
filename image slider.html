<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Slider</title>
    <link rel="stylesheet" href="image slider.css">
</head>
<body>

<div class="slider">
    <div class="slides">

        <div class="slide active">
            <img src="https://picsum.photos/id/1018/1200/600" alt="">
            <div class="content">
                <h2>Beautiful Nature</h2>
                <p>Experience stunning landscapes.</p>
            </div>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1015/1200/600" alt="">
            <div class="content">
                <h2>Adventure Awaits</h2>
                <p>Explore the world around you.</p>
            </div>
        </div>

        <div class="slide">
            <img src="https://picsum.photos/id/1019/1200/600" alt="">
            <div class="content">
                <h2>Mountain Views</h2>
                <p>Enjoy breathtaking scenery.</p>
            </div>
        </div>

    </div>

    <button class="nav prev">&#10094;</button>
    <button class="nav next">&#10095;</button>

    <div class="dots"></div>
</div>

<script src="image slidee.js"></script>
</body>
</html>
